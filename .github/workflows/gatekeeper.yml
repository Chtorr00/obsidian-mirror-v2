name: Mirror Gatekeeper

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Mirror Sync
        run: npm run sync
        env:
          NODE_ENV: production

      - name: Check for Changes
        id: git-check
        run: |
          git config --global user.name "Mirror Architect (CI)"
          git config --global user.email "mirror-ci@antigravity.ai"
          git add lib/data.ts
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push Changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git commit -m "chore(sync): automated embargo release $(date +'%Y-%m-%d')"
          git push
